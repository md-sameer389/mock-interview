<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Session | Command Center</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/voice.css">
    <link rel="stylesheet" href="css/coding.css">
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
</head>

<body class="command-center-body">
    <!-- Dynamic Background -->
    <div class="ambient-bg"></div>
    <div class="grid-overlay"></div>

    <div class="hud-container">
        <!-- TOP BAR: Status & Timer -->
        <header class="hud-header glass-panel">
            <div class="logo-area">
                <span class="status-dot online"></span>
                <span class="system-text">AI INTERVIEW SYSTEM <span class="version">v2.1 (B.Tech)</span></span>
            </div>
            <div class="session-info">
                <div class="progress-tracker">
                    <span class="label">PROGRESS</span>
                    <div class="progress-bar-container">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="question-counter" class="counter">01/10</span>
                </div>
                <div class="mode-indicator">
                    <span class="highlight">LIVE</span> SESSION
                </div>
            </div>
        </header>

        <!-- MAIN STAGE: Split View -->
        <main class="hud-main">
            <!-- LEFT: The Interviewer (AI Representation) -->
            <section class="interviewer-stage">
                <div class="avatar-container animate-float">
                    <!-- Central Visualizer -->
                    <div class="visualizer-circle" id="visualizer-circle">
                        <div class="wave wave-1"></div>
                        <div class="wave wave-2"></div>
                        <div class="wave wave-3"></div>
                        <div class="core-circle"></div>
                    </div>
                    <div class="status-message" id="interviewer-status">Listening...</div>
                </div>

                <!-- Coding Context Panel (Visible only in coding mode) -->
                <div class="coding-context-panel" id="coding-context">
                    <div class="coding-title">Problem Statement</div>
                    <div class="coding-desc" id="coding-desc-text">Loading...</div>
                </div>

                <!-- Feedback / System Logs Overlay -->
                <div id="system-logs" class="system-logs glass-panel-sm" style="display: none;">
                    <div class="log-header">/// SYSTEM LOGS</div>
                    <div id="log-content" class="log-content">Initializing...</div>
                </div>
            </section>

            <!-- RIGHT: Interaction Zone -->
            <section class="interaction-zone">
                <!-- Question Card -->
                <div class="question-card glass-panel animate-slide-in-right" id="question-container">
                    <div class="card-header">
                        <span id="question-difficulty" class="tag difficulty-tag">DIFFICULTY_NULL</span>
                        <span id="question-skill" class="tag skill-tag">SKILL_NULL</span>
                    </div>
                    <h2 id="question-text" class="question-text typing-effect" style="white-space: pre-line;">
                        Initializing Interface...</h2>
                    <div id="code-container"
                        style="display: none; margin-top: 15px; background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #d4d4d4; overflow-x: auto; border: 1px solid #333;">
                        <pre><code id="question-code"></code></pre>
                    </div>
                </div>

                <!-- CODING MODE: Editor & Console -->
                <div class="editor-toolbar" id="editor-toolbar">
                    <div style="font-family: var(--font-code); color: var(--text-dim); font-size: 0.8rem;">PYTHON 3.10
                    </div>
                    <button class="run-btn" id="run-code-btn" onclick="runCode()">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        RUN CODE
                    </button>
                </div>

                <div id="monaco-wrapper">
                    <div id="monaco-editor"></div>
                </div>

                <div class="output-console" id="console-panel">
                    <div class="console-header">
                        <span>Terminal Output</span>
                        <span id="console-status">Ready</span>
                    </div>
                    <div class="console-content" id="console-output"></div>
                </div>

                <!-- Command Bar (New Bottom Layout) -->
                <div class="command-bar glass-panel-dark" id="txt-command-bar">
                    <!-- Text Input Area (Auto-expanding) -->
                    <div class="input-area">
                        <textarea id="answer-input" placeholder="Type your answer here..." rows="1"></textarea>
                        <span id="char-counter" class="char-count">0 / 2000</span>
                    </div>

                    <!-- Controls Row -->
                    <div class="controls-row">
                        <!-- Left: Status/Visuals (Empty for balance or secondary controls) -->
                        <div class="controls-left"></div>

                        <!-- Center: Primary Voice Control -->
                        <div class="controls-center">
                            <button id="mic-btn" class="mic-commander" title="Toggle Microphone"
                                onclick="voiceManager.toggleListening()">
                                <div class="mic-icon">
                                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor"
                                        stroke-width="2" fill="none">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                        <line x1="12" y1="19" x2="12" y2="23"></line>
                                        <line x1="8" y1="23" x2="16" y2="23"></line>
                                    </svg>
                                </div>
                                <div class="mic-label">PUSH TO TALK</div>
                            </button>
                        </div>

                        <!-- Right: Actions -->
                        <div class="controls-right">
                            <button id="submit-btn" class="action-btn success-glow" onclick="submitAnswer()">
                                <span>SUBMIT ANSWER</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                            <button id="next-btn" class="action-btn next-glow" onclick="nextQuestion()"
                                style="display: none;">
                                <span>NEXT MODULE</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- MESSAGE TOAST -->
        <div id="message" class="system-toast"></div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/voice.js"></script>
    <script>
        // ==================== INITIALIZATION ====================
        // Global State
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id') || localStorage.getItem('session_id');
        let currentQuestion = null;
        let questionCount = 0;
        let totalQuestions = 10; // Default, updated by API

        // Init
        // Init
        async function initializeInterview() {
            const statusEl = document.getElementById('question-text');
            statusEl.innerText = "Connecting to Core...";

            if (!sessionId) {
                statusEl.innerText = "Error: Invalid Session. Redirecting...";
                setTimeout(() => window.location.href = 'upload_resume.html', 2000);
                return;
            }

            try {
                statusEl.innerText = "Fetching Module 01...";
                await fetchNextQuestion();
            } catch (e) {
                console.error("Init failed", e);
                statusEl.innerText = "System Failure: " + e.message;
                statusEl.classList.add('error-text'); // Ensure this class exists or it will just be plain
            }
        }

        async function fetchNextQuestion() {
            const statusEl = document.getElementById('question-text');
            try {
                console.log("Fetching question for session:", sessionId);

                const response = await fetch(`${API_BASE_URL}/interview/next-question`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                if (data.question) {
                    // Update global state with server truth
                    if (data.progress) {
                        console.log("SERVER PROGRESS:", data.progress);
                        // Server is authority on progress
                        // Frontend is 1-indexed for display, answered is 0-indexed count
                        questionCount = data.progress.answered + 1;
                        totalQuestions = data.progress.total;
                    } else {
                        console.warn("NO PROGRESS DATA FROM SERVER");
                        // Fallback logic
                        questionCount++;
                    }

                    currentQuestion = data.question;
                    displayQuestion();
                } else {
                    // No more questions -> Results
                    statusEl.innerText = "Session Complete. Processing...";
                    window.location.href = `result.html?session_id=${sessionId}`;
                }
            } catch (e) {
                console.error("Fetch error", e);
                statusEl.innerText = "Network Error: " + e.message;
                showToast("Connection Lost", "error");
            }
        }

        // ==================== MONACO & CODING ====================
        let monacoEditor = null;
        let isCodingMode = false;

        function initMonaco() {
            if (monacoEditor) return;

            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' } });
            require(['vs/editor/editor.main'], function () {
                monacoEditor = monaco.editor.create(document.getElementById('monaco-editor'), {
                    value: "# Write your Python solution here\n\ndef solution():\n    pass",
                    language: 'python',
                    theme: 'vs-dark',
                    minimap: { enabled: false },
                    fontSize: 14,
                    lineNumbers: 'on',
                    scrollBeyondLastLine: false,
                    automaticLayout: true
                });
            });
        }

        async function runCode() {
            if (!monacoEditor) return;
            const code = monacoEditor.getValue();
            const consoleOutput = document.getElementById('console-output');
            const status = document.getElementById('console-status');

            consoleOutput.innerText = "Running...";
            status.innerText = "Executing";
            status.style.color = "#fbc531"; // yellow

            try {
                const response = await fetch(`${API_BASE_URL}/interview/run-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': localStorage.getItem('token') },
                    body: JSON.stringify({ code: code })
                });

                const data = await response.json();

                let outputText = "";
                if (data.output) outputText += data.output;
                if (data.error) outputText += "\n[ERROR]\n" + data.error;

                if (!outputText) outputText = "[Process finished with no output]";

                consoleOutput.innerText = outputText;

                if (data.error) {
                    consoleOutput.className = "console-content error";
                    status.innerText = "Failed";
                    status.style.color = "#ff4757";
                } else {
                    consoleOutput.className = "console-content";
                    status.innerText = "Success";
                    status.style.color = "#4cd137";
                }

            } catch (e) {
                consoleOutput.innerText = "Execution Error: " + e.message;
                status.innerText = "Error";
                status.style.color = "#ff4757";
            }
        }

        // ==================== UI CONTROLLERS ====================

        function updateProgress() {
            const progress = ((questionCount) / totalQuestions) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('question-counter').innerText =
                `${String(questionCount).padStart(2, '0')}/${String(totalQuestions).padStart(2, '0')}`;
        }

        function displayQuestion() {
            if (!currentQuestion) return;

            // Update Progress UI
            const progress = (questionCount / totalQuestions) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('question-counter').innerText =
                `${String(questionCount).padStart(2, '0')}/${String(totalQuestions).padStart(2, '0')}`;

            // === MODE SWITCHING ===
            const isCoding = currentQuestion.question_type === 'coding' || currentQuestion.question_type === 'output_guess';
            isCodingMode = isCoding;
            const mainStage = document.querySelector('.hud-main');
            const normalInput = document.getElementById('txt-command-bar');
            const codingToolbar = document.getElementById('editor-toolbar');
            const monacoWrapper = document.getElementById('monaco-wrapper');
            const consolePanel = document.getElementById('console-panel');
            const questionCard = document.getElementById('question-container');
            const contextPanel = document.getElementById('coding-context');

            if (isCoding) {
                // ACTIVATE CODING MODE
                mainStage.classList.add('coding-mode');

                // Hide Standard Items
                normalInput.style.display = 'none'; // Hide text input, submit button will be moved or we use a separate one? 
                // Wait, we need submit button functionality. 
                // For now, let's keep the command bar VISIBLE but hide the textarea input?
                // actually, the design has a separate RUN button.
                // We still need SUBMIT to finish.
                // Let's keep command bar but maybe simplified?

                // My CSS hides question-card by default in .coding-mode
                // My CSS shows coding-context-panel in .coding-mode
                // My CSS shows editor/console in .coding-mode

                // Left Panel Content
                document.querySelector('.coding-title').innerText = currentQuestion.skill_name || "Coding Challenge";
                document.getElementById('coding-desc-text').innerHTML = formatQuestionText(currentQuestion.question_text);

                // Right Panel Content
                // Initialize Monaco
                setTimeout(() => {
                    initMonaco();
                    if (monacoEditor) {
                        // Set default code if provided or template
                        const defaultCode = currentQuestion.code_snippet || "# Write your solution here\n\ndef solution():\n    # TODO\n    pass";
                        // Only set value if it differs to avoid overwrite on re-render? 
                        // Actually re-render usually implies new question.
                        monacoEditor.setValue(defaultCode);
                        monacoEditor.layout(); // Fix size
                    }
                }, 100);

                // Ensure Command Bar handles "submit"
                // We might want to show the Submit button in the Toolbar instead?
                // Or keep the command bar at the bottom just for the "Submit" and "Next" buttons.
                normalInput.style.display = 'flex'; // Keep it visible for the buttons
                document.querySelector('.input-area').style.display = 'none'; // Hide text area
                document.querySelector('.controls-center').style.display = 'none'; // Hide Mic

            } else {
                // STANDARD MODE
                mainStage.classList.remove('coding-mode');

                normalInput.style.display = 'flex';
                document.querySelector('.input-area').style.display = 'flex'; // Show text area
                document.querySelector('.controls-center').style.display = 'flex'; // Show Mic

                // Standard Text Updates
                const qText = document.getElementById('question-text');
                qText.innerHTML = formatQuestionText(currentQuestion.question_text || 'Error loading text');

                // Tags
                const diffTag = document.getElementById('question-difficulty');
                diffTag.innerText = (currentQuestion.difficulty || 'Normal').toUpperCase();
                diffTag.className = `tag difficulty-tag ${currentQuestion.difficulty?.toLowerCase() || 'medium'}`;
                document.getElementById('question-skill').innerText = (currentQuestion.skill_name || 'General').toUpperCase();

                // Voice Speaking
                if (window.voiceManager) {
                    setTimeout(() => window.voiceManager.speak(currentQuestion.question_text), 500);
                }
            }

            // Reset Input (Standard)
            const input = document.getElementById('answer-input');
            input.value = '';
            input.disabled = false;

            // Button States
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.style.display = 'flex';
            submitBtn.innerHTML = 'SUBMIT SOLUTION';
            submitBtn.disabled = false;
            document.getElementById('next-btn').style.display = 'none';
        }

        async function submitAnswer() {
            // STOP RECORDING IMMEDIATELY
            if (window.voiceManager) window.voiceManager.stopListening();

            let answer = "";
            const answerInput = document.getElementById('answer-input');

            if (isCodingMode && monacoEditor) {
                answer = monacoEditor.getValue();
            } else {
                answer = answerInput.value.trim();
            }

            if (!answer) {
                showToast("INPUT REQUIRED", "error");
                return;
            }

            // UI Loading State
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'PROCESSING...';
            btn.disabled = true;

            try {
                // API Call
                const response = await fetch(`${API_BASE_URL}/interview/submit-answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        question_id: currentQuestion.id,
                        user_answer: answer
                    })
                });

                if (!response.ok) throw new Error('Submission failed');

                // Success State
                showToast("ANSWER LOGGED", "success");

                // Show Next Button
                btn.style.display = 'none';
                const nextBtn = document.getElementById('next-btn');
                nextBtn.style.display = 'flex';
                nextBtn.onclick = () => {
                    fetchNextQuestion(); // Fetch next dynamic question
                };

                // Disable Inputs
                if (isCodingMode && monacoEditor) {
                    monacoEditor.updateOptions({ readOnly: true });
                } else {
                    answerInput.disabled = true;
                }

            } catch (e) {
                console.error(e);
                showToast("SYSTEM ERROR: " + e.message, "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }



        // Old local iteration is replaced by fetchNextQuestion()
        // function nextQuestion() { ... } removed


        // ==================== UTILS ====================
        /**
         * Safely convert question text to HTML:
         * - Escapes any HTML entities to prevent injection
         * - Converts \n to <br> for proper line breaks
         * - Wraps code-like lines (starting with spaces/keywords) in <code>
         */
        function formatQuestionText(text) {
            if (!text) return '';
            // 1. Escape HTML entities
            const escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
            // 2. Convert literal '\\n' strings and actual '\n' newlines to <br>
            let withBreaks = escaped.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
            // 3. Optional: Wrap code-like blocks if needed (simple heuristic)
            return withBreaks;
        }
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('message');
            toast.innerText = msg;
            toast.className = `system-toast show ${type}`;
            setTimeout(() => toast.className = 'system-toast', 3000);
        }

        // Input Monitor
        document.getElementById('answer-input').addEventListener('input', (e) => {
            const len = e.target.value.length;
            document.getElementById('char-counter').innerText = `${len} / 2000`;
        });

        // Initialize
        // Dummy data for dev if localstorage empty
        // Initialize
        // questions check removed (deprecated)


        displayQuestion();

        // Start the engine
        initializeInterview();
    </script>
</body>

</html>
